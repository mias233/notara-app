<style>
/* Modals styling already in components, specific logic/buttons here */
.btn-cancel { background: transparent; color: var(--text-muted); padding: 10px 16px; border-radius: var(--radius-md); border: none; }
.btn-cancel:hover { background: var(--surface-hover); color: var(--text-main); }
.btn-danger { background: rgba(248, 113, 113, 0.1); color: var(--error); border: 1px solid rgba(248, 113, 113, 0.2); padding: 10px 16px; border-radius: var(--radius-md); font-family: var(--font-ui); font-weight: 700; cursor: pointer; }
.btn-danger:hover { background: var(--error); color: #fff; }
.modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
.modal h3 { margin-bottom: 20px; font-size: 24px; }
.modal p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
</style>

<div id="deleteModal" class="modal">
    <div class="modal-content">
        <h3>Delete Note?</h3>
        <p>Are you sure you want to delete this note? This action cannot be undone.</p>
        <div class="modal-actions">
            <button class="btn-cancel" id="btnCancelDelete">Cancel</button>
            <button class="btn-danger" id="btnConfirmDelete">Delete</button>
        </div>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-content">
        <h3>Edit Profile</h3>
        <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="profileName" class="form-input">
        </div>
        <div class="form-group">
            <label>Anthropic API Key (Claude API)</label>
            <input type="text" id="profileApiKey" class="form-input" placeholder="sk-ant-...">
            <p style="font-size: 11px; color: var(--text-faint); margin-top: 6px;">Stored locally. Required for AI features.</p>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" id="btnCancelProfile">Cancel</button>
            <button class="btn-primary" id="btnSaveProfile" style="width: auto; padding: 10px 20px; font-size: 14px; margin-top: 0;">Save Changes</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
