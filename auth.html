<style>
#authWrap {
    position: fixed; inset: 0; z-index: 9000;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(10px);
}
.auth-card {
    background: rgba(26, 26, 30, 0.7); border: 1px solid var(--border);
    border-radius: var(--radius-lg); width: 100%; max-width: 400px;
    padding: 40px; box-shadow: var(--shadow-lg); backdrop-filter: blur(20px);
}
.auth-header { text-align: center; margin-bottom: 30px; }
.auth-tabs { display: flex; gap: 10px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.auth-tab { flex: 1; background: transparent; color: var(--text-muted); font-size: 14px; padding: 8px; border-radius: var(--radius-sm); }
.auth-tab.active { color: var(--text-main); background: var(--surface); }
.pwd-toggle { position: absolute; right: 12px; top: 32px; color: var(--text-muted); cursor: pointer; background: none; border: none; }
.divider { display: flex; align-items: center; text-align: center; margin: 24px 0; color: var(--text-faint); font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
.divider::before { margin-right: 12px; } .divider::after { margin-left: 12px; }
.btn-google {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text-main);
    padding: 12px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px;
}
.btn-google:hover { background: var(--surface-hover); }
.password-strength { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
.strength-bar { height: 100%; width: 0%; background: var(--error); transition: all 0.3s; }

@media (max-width: 480px) {
    .auth-card { padding: 24px; border-radius: 0; border: none; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
}
</style>

<div id="authWrap" style="display: none;">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="logo" style="margin-bottom: 8px;">Notara<i>.</i></h1>
            <p style="color: var(--text-muted); font-size: 14px;">Your AI-powered thought space</p>
        </div>
        
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabSignIn">Sign In</button>
            <button class="auth-tab" id="tabSignUp">Sign Up</button>
        </div>

        <form id="authForm">
            <div class="form-group" id="nameGroup" style="display: none;">
                <label>Full Name</label>
                <input type="text" id="authName" class="form-input" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="authEmail" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="authPassword" class="form-input" placeholder="••••••••" required>
                <button type="button" class="pwd-toggle" tabindex="-1"><i class="ph ph-eye"></i></button>
                <div class="password-strength" id="pwdStrengthWrap"><div class="strength-bar" id="pwdStrengthBar"></div></div>
            </div>
            <div class="form-group" id="confirmPwdGroup" style="display: none;">
                <label>Confirm Password</label>
                <input type="password" id="authConfirm" class="form-input" placeholder="••••••••">
                <button type="button" class="pwd-toggle" tabindex="-1"><i class="ph ph-eye"></i></button>
            </div>
            
            <div id="authError" style="color: var(--error); font-size: 12px; margin-bottom: 12px; display: none;"></div>
            
            <button type="submit" class="btn-primary" id="authSubmitBtn">Sign In</button>
        </form>

        <div class="divider">or continue with</div>
        <button class="btn-google" id="btnGoogle">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
        </button>
    </div>
</div>
