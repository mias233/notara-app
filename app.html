<style>
/* User Pill */
.user-pill {
    display: flex; align-items: center; gap: 10px; background: var(--surface);
    padding: 6px 12px 6px 6px; border-radius: var(--radius-full); cursor: pointer;
    border: 1px solid var(--border); position: relative;
}
.user-pill:hover { background: var(--surface-hover); }
.avatar-wrap { position: relative; width: 32px; height: 32px; }
.avatar {
    width: 100%; height: 100%; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; font-family: var(--font-ui);
    font-weight: 700; object-fit: cover;
}
.google-badge {
    position: absolute; bottom: -2px; right: -2px; background: #fff;
    border-radius: 50%; padding: 2px; font-size: 10px; display: none;
}
.user-name { font-size: 13px; font-weight: 500; }

/* Dropdown */
.dropdown {
    position: absolute; top: calc(100% + 10px); right: 0; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px;
    min-width: 200px; box-shadow: var(--shadow-lg); display: none; flex-direction: column; z-index: 100;
}
.dropdown.show { display: flex; }
.dropdown-item {
    padding: 10px 12px; background: transparent; color: var(--text-main); text-align: left;
    border-radius: var(--radius-sm); font-size: 13px; display: flex; align-items: center; gap: 10px; border: none;
}
.dropdown-item:hover { background: var(--surface-hover); }
.dropdown-item.danger { color: var(--error); }
.dropdown-header { padding: 8px 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.dropdown-email { font-size: 11px; color: var(--text-muted); word-break: break-all; }

/* Tags */
.tags-input-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.tag-chip {
    background: var(--surface); border: 1px solid var(--border); padding: 4px 10px;
    border-radius: var(--radius-full); font-size: 12px; display: flex; align-items: center; gap: 6px;
}
.tag-chip button { background: none; color: var(--text-muted); font-size: 14px; display: flex; align-items: center; border: none; }
.tag-chip button:hover { color: var(--error); }
.tag-input { width: 120px; font-size: 13px; padding: 4px; }
.tag-input::placeholder { color: var(--text-faint); }
.note-tags-mini { display: flex; gap: 4px; flex-wrap: wrap; }
.tag-mini { background: rgba(124, 106, 247, 0.15); color: var(--accent-light); padding: 2px 6px; border-radius: 4px; font-size: 10px; }

/* AI Panel Internals */
.ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.ai-header h4 { font-family: var(--font-ui); font-size: 16px; color: var(--accent-light); display: flex; align-items: center; gap: 8px;}
.close-ai-btn { color: var(--text-muted); background: none; font-size: 20px; border: none; }
.ai-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.ai-action-btn { background: var(--surface-hover); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: var(--radius-md); font-size: 13px; }
.ai-action-btn:hover { color: var(--text-main); border-color: var(--text-faint); }
.ai-prompt-wrap { position: relative; margin-bottom: 16px; }
.ai-prompt-input { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px 44px 14px 16px; border-radius: var(--radius-lg); font-size: 14px; }
.ai-prompt-input:focus { border-color: var(--accent); }
.ai-submit-btn { position: absolute; right: 8px; top: 8px; width: 30px; height: 30px; background: var(--accent); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; }
.ai-submit-btn:disabled { background: var(--border); color: var(--text-faint); }
.ai-response-area { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; display: none; flex-direction: column; gap: 16px; max-height: 250px; overflow-y: auto; }
.ai-response-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.ai-result-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: auto; border-top: 1px solid var(--border); padding-top: 12px; }
.ai-result-btn { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); padding: 6px 12px; font-size: 12px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 6px; }
.ai-result-btn:hover { background: var(--surface-hover); color: var(--text-main); }
.ai-loader { display: none; align-items: center; gap: 8px; color: var(--accent-light); font-size: 13px; font-family: var(--font-ui); margin-bottom: 16px; }
.typing-dots { display: flex; gap: 4px; }
.dot { width: 4px; height: 4px; background: currentColor; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.dot:nth-child(1) { animation-delay: -0.32s; }
.dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

/* Search input */
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 12px; top: 12px; color: var(--text-muted); }
.search-input { width: 100%; background: var(--surface-hover); border: 1px solid transparent; padding: 10px 10px 10px 36px; border-radius: var(--radius-md); font-size: 13px; }
.search-input:focus { border-color: var(--border); background: var(--surface); }

/* Status Bar */
.status-bar { height: 30px; background: rgba(13, 13, 15, 0.9); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 11px; color: var(--text-faint); z-index: 30; }
.save-state { display: flex; align-items: center; gap: 6px; }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); transition: background 0.3s; }
.save-dot.unsaved { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
.save-dot.saving { background: var(--accent); animation: pulse 1s infinite; }
.save-dot.saved { background: var(--text-faint); }
@keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
</style>

<div class="app" id="appWrap" style="display: none;">
    <header>
        <div class="header-left">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="ph ph-list"></i></button>
            <h1 class="logo">Notara<i>.</i></h1>
        </div>
        <div class="header-right">
            <div class="user-pill" id="userPill">
                <div class="avatar-wrap">
                    <img src="" alt="Avatar" class="avatar" id="userAvatarImg" style="display: none;">
                    <div class="avatar" id="userAvatarChar">U</div>
                    <div class="google-badge" id="googleBadge"><svg width="10" height="10" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></div>
                </div>
                <span class="user-name" id="userName">User</span>
                <i class="ph ph-caret-down" style="color: var(--text-muted);"></i>
                
                <div class="dropdown" id="userDropdown">
                    <div class="dropdown-header">
                        <div id="dropName" style="font-weight: 700; font-family: var(--font-ui);">User Name</div>
                        <div class="dropdown-email" id="dropEmail">user@example.com</div>
                    </div>
                    <button class="dropdown-item" id="btnEditProfile"><i class="ph ph-user-circle"></i> Edit Profile</button>
                    <button class="dropdown-item danger" id="btnSignOut"><i class="ph ph-sign-out"></i> Sign Out</button>
                </div>
            </div>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="search-wrap">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search notes...">
            </div>
            <button class="new-note-btn" id="btnNewNote">
                <i class="ph ph-plus"></i> New Note
            </button>
        </div>
        <div class="notes-list" id="notesList">
            <!-- Notes will be injected here -->
        </div>
    </div>

    <main class="editor-area">
        <div class="empty-state" id="emptyState">
            <i class="ph ph-notebook empty-icon"></i>
            <h3>Select a Note</h3>
            <p>Choose a note from the sidebar or create a new one to start writing.</p>
        </div>

        <div class="editor-content" id="editorContent" style="display: none;">
            <div class="editor-toolbar">
                <div class="toolbar-left">
                    <div class="tags-input-wrap" id="tagsWrap">
                        <!-- Tag chips go here -->
                        <input type="text" class="tag-input" id="tagInput" placeholder="Add tag...">
                    </div>
                </div>
                <div class="toolbar-right">
                    <button class="icon-btn" title="AI Assistant" id="btnOpenAI"><i class="ph-fill ph-magic-wand" style="color: var(--accent-light);"></i></button>
                    <button class="icon-btn" title="Manual Save (Ctrl+S)" id="btnManualSave"><i class="ph ph-floppy-disk"></i></button>
                    <button class="icon-btn" title="Delete Note" id="btnDeleteNote"><i class="ph ph-trash"></i></button>
                </div>
            </div>
            
            <div class="editor-body">
                <textarea class="title-input" id="noteTitle" placeholder="Note Title"></textarea>
                <textarea class="content-input" id="noteContent" placeholder="Start typing..."></textarea>
            </div>

            <div class="ai-panel" id="aiPanel">
                <div class="ai-header">
                    <h4><i class="ph-fill ph-sparkle"></i> AI Assistant</h4>
                    <button class="close-ai-btn" id="btnCloseAI"><i class="ph ph-x"></i></button>
                </div>
                
                <div class="ai-actions">
                    <button class="ai-action-btn" data-action="summarize">📝 Summarize</button>
                    <button class="ai-action-btn" data-action="polish">✨ Polish</button>
                    <button class="ai-action-btn" data-action="action-items">🎯 Action items</button>
                    <button class="ai-action-btn" data-action="continue">✍️ Continue</button>
                    <button class="ai-action-btn" data-action="tags">🏷️ Suggest Tags</button>
                    <button class="ai-action-btn" data-action="rephrase">🌐 Rephrase</button>
                </div>
                
                <div class="ai-prompt-wrap">
                    <input type="text" class="ai-prompt-input" id="aiCustomPrompt" placeholder="Ask Claude anything about this note...">
                    <button class="ai-submit-btn" id="btnSubmitAI"><i class="ph ph-arrow-up"></i></button>
                </div>
                
                <div class="ai-loader" id="aiLoader">
                    <i class="ph-fill ph-magic-wand"></i> Claude is thinking...
                    <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>
                
                <div class="ai-response-area" id="aiResponseArea">
                    <div class="ai-response-text" id="aiResponseText"></div>
                    <div class="ai-result-actions">
                        <button class="ai-result-btn" id="btnAiReplace"><i class="ph ph-arrows-down-up"></i> Replace</button>
                        <button class="ai-result-btn" id="btnAiAppend"><i class="ph ph-plus"></i> Append</button>
                        <button class="ai-result-btn" id="btnAiCopy"><i class="ph ph-copy"></i> Copy</button>
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <div class="save-state">
                    <div class="save-dot saved" id="saveDot"></div>
                    <span id="saveText">Saved</span>
                </div>
                <div class="word-count" id="wordCount">0 words</div>
            </div>
        </div>
    </main>
</div>
